tags:
  - Clustering
summary: Run Agglomerative Clustering
description: Analyzes a saved PCAP file to cluster network traffic and detect anomalies.
parameters:
  - in: body
    name: body
    required: true
    schema:
      type: object
      properties:
        file:
          type: string
          description: The filename of the PCAP to analyze.
        clusters:
          type: integer
          default: 4
          description: The maximum number of clusters to form.
        anomaly_threshold:
          type: number
          default: 2
          description: Threshold for marking traffic as anomalous.
responses:
  200:
    description: Clustering analysis results.
  400:
    description: JSON body required.
  404:
    description: PCAP file not found.
  500:
    description: Clustering process failed.
