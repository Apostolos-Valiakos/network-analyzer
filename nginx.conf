server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options          "DENY"                            always;
    add_header X-Content-Type-Options   "nosniff"                         always;
    add_header X-XSS-Protection         "1; mode=block"                   always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

    # Content-Security-Policy:
    #  • connect-src covers the Flask REST API (5555) and SocketIO WS (5001).
    #    Update these values if the backend runs on a different host/port.
    #  • 'unsafe-inline' / 'unsafe-eval' are required by Vuetify/ECharts bundles.
    #    Remove them if you add a nonce-based CSP in a future hardening pass.
    add_header Content-Security-Policy
        "default-src 'self'; \
         script-src 'self' 'unsafe-inline' 'unsafe-eval'; \
         style-src 'self' 'unsafe-inline'; \
         img-src 'self' data: blob:; \
         font-src 'self' data:; \
         worker-src blob:; \
         connect-src 'self' http://127.0.0.1:5555 http://localhost:5555 ws://127.0.0.1:5001 ws://localhost:5001;"
        always;

    # Uncomment when TLS is configured:
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # ─────────────────────────────────────────────────────────────────────────

    # SPA fallback — all routes served by index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Block access to hidden files (.git, .env, etc.)
    location ~ /\. {
        deny all;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
